name: Daily Commit

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update log
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" >> log.txt

      - name: Commit and push
        run: |
          git config user.name "ricardomorenosantos"
          git config user.email "rickmorenosan@gmail.com"
          git add log.txt
          git commit -m "chore: daily update $(date -u '+%Y-%m-%d')"
          git push
